name: Multiple Jobs Example

on: workflow_dispatch

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Build Step
              run: echo "Demo build step"
    
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Test Step
              run: echo "Running test cases"
    
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Deploy the app
              run: echo "Deploying the app"